<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>凤鸣深宫</title>
<style>
:root{
  --bg:#0a0606;--bg2:#130d0d;--bg3:#221414;--bg4:#1a1010;
  --border:#5a3520;--border2:#8a5530;
  --text:#f0dfc0;--text2:#c8a870;--text3:#8a6840;
  --acc:#d4a828;--acc2:#c02020;--acc3:#f0d060;
  --jade:#2a9070;--rose:#c05070;--purple:#7050b0;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'STKaiti','KaiTi','楷体',Georgia,serif;
  display:flex;flex-direction:column;}

/* ══ TOPBAR ══ */
#topbar{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 16px;height:52px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;z-index:100;
  position:relative;
}
.tb-left{display:flex;align-items:center;gap:12px;}
.tb-title{font-size:15px;color:var(--acc);letter-spacing:3px;}
.tb-chap{font-size:11px;color:var(--text3);letter-spacing:1px;}
.tb-right{display:flex;align-items:center;gap:10px;}
.nav-btn{
  padding:4px 12px;background:none;border:1px solid var(--border);
  color:var(--text3);font-size:11px;cursor:pointer;border-radius:3px;
  font-family:inherit;transition:all .2s;letter-spacing:1px;
}
.nav-btn:hover,.nav-btn.active{background:var(--bg3);border-color:var(--acc);color:var(--acc);}
.vocab-pill{
  background:var(--bg3);border:1px solid var(--border);
  padding:3px 10px;border-radius:12px;font-size:11px;color:var(--text2);
}
.vocab-pill span{color:var(--acc);font-weight:bold;}

/* ══ PROGRESS BAR ══ */
#prog{position:absolute;bottom:0;left:0;height:2px;
  background:linear-gradient(90deg,var(--acc2),var(--acc));
  transition:width .3s;width:0%;}

/* ══ STAT BAR ══ */
#statbar{
  background:var(--bg3);border-bottom:1px solid var(--border);
  padding:6px 16px;display:flex;gap:16px;flex-shrink:0;
  overflow-x:auto;
}
.stat-item{display:flex;align-items:center;gap:5px;white-space:nowrap;}
.stat-icon{font-size:13px;}
.stat-name{font-size:10px;color:var(--text3);letter-spacing:1px;}
.stat-val{font-size:13px;font-weight:bold;}
.stat-bar-wrap{width:52px;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.22,1,.36,1);}

/* ══ MAIN AREA ══ */
#main{flex:1;overflow:hidden;position:relative;}

/* ══ SCREENS ══ */
.screen{
  position:absolute;inset:0;overflow-y:auto;
  display:flex;flex-direction:column;align-items:center;
  opacity:0;pointer-events:none;transition:opacity .35s;
}
.screen.active{opacity:1;pointer-events:auto;}

/* ══ GATE SCREEN ══ */
#gate-screen{background:radial-gradient(ellipse,#180808,#000);justify-content:center;}
.gate-wrap{position:relative;width:100%;height:100%;overflow:hidden;max-height:100vh;}
.gate-half{
  position:absolute;top:0;width:50%;height:100%;
  background:linear-gradient(to bottom,#5a0e0e,#7a1212,#5a0e0e);
  transition:transform 2.2s cubic-bezier(.77,0,.18,1);
  display:flex;align-items:center;
}
.gate-half.L{left:0;justify-content:flex-end;border-right:3px solid #b88018;}
.gate-half.R{right:0;justify-content:flex-start;border-left:3px solid #b88018;}
.gate-ring{width:60px;height:60px;border-radius:50%;
  background:radial-gradient(circle,#f0d050,#c08018,#906010);
  box-shadow:0 0 16px rgba(200,150,30,.8);margin:24px;}
.gate-pat{position:absolute;inset:0;opacity:.1;
  background-image:repeating-linear-gradient(45deg,#d4a830 0,#d4a830 1px,transparent 0,transparent 50%);
  background-size:20px 20px;}
.gate-overlay{
  position:absolute;inset:0;z-index:2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;
}
.gate-open .gate-half.L{transform:translateX(-100%);}
.gate-open .gate-half.R{transform:translateX(100%);}
.gate-center{text-align:center;pointer-events:auto;z-index:3;}
.g-series{font-size:12px;letter-spacing:8px;color:var(--acc);margin-bottom:14px;opacity:.8;}
.g-chapnum{font-size:11px;letter-spacing:4px;color:var(--text3);margin-bottom:8px;}
.g-title{font-size:clamp(1.8rem,5.5vw,3.2rem);color:var(--acc3);letter-spacing:10px;
  text-shadow:0 0 25px rgba(212,168,48,.5);margin-bottom:6px;line-height:1.3;}
.g-sub{font-size:14px;letter-spacing:5px;color:var(--text2);margin-bottom:36px;}
.enter-btn{
  padding:12px 44px;background:transparent;
  border:1px solid var(--acc);color:var(--acc);
  font-size:14px;letter-spacing:6px;cursor:pointer;
  font-family:inherit;transition:all .3s;
  position:relative;overflow:hidden;
}
.enter-btn::before{content:'';position:absolute;inset:0;background:var(--acc);
  transform:scaleX(0);transform-origin:left;transition:transform .3s;z-index:-1;}
.enter-btn:hover{color:#000;}
.enter-btn:hover::before{transform:scaleX(1);}

/* ══ CHAPTER SELECT ══ */
#chapsel-screen{background:var(--bg);padding:40px 20px;gap:20px;}
.chapsel-title{font-size:22px;color:var(--acc);letter-spacing:6px;margin-bottom:8px;}
.chapsel-sub{font-size:12px;color:var(--text3);letter-spacing:2px;margin-bottom:28px;}
.chap-cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:520px;}
.chap-card{
  background:var(--bg2);border:1px solid var(--border);
  padding:18px 22px;cursor:pointer;transition:all .2s;border-radius:6px;
  display:flex;align-items:center;gap:16px;
}
.chap-card:hover{border-color:var(--acc);background:var(--bg3);}
.chap-card.locked{opacity:.4;cursor:default;}
.cc-num{font-size:2rem;color:var(--acc);min-width:44px;text-align:center;}
.cc-info{}
.cc-name{font-size:15px;color:var(--acc3);margin-bottom:4px;}
.cc-desc{font-size:11px;color:var(--text3);letter-spacing:1px;}
.cc-badge{margin-left:auto;font-size:10px;background:var(--bg3);
  border:1px solid var(--border);padding:2px 8px;border-radius:10px;color:var(--text3);}
.cc-badge.done{border-color:var(--jade);color:var(--jade);}

/* ══ STORY PAGE ══ */
#story-screen{padding:0;}
.page-wrap{
  width:100%;max-width:680px;
  min-height:100%;
  padding:28px 20px 100px;
  display:flex;flex-direction:column;gap:0;
}

/* page counter */
.page-counter{
  font-size:10px;color:var(--text3);letter-spacing:2px;
  text-align:center;margin-bottom:20px;
}

/* scene divider */
.sdiv{display:flex;align-items:center;gap:10px;margin:24px 0 18px;}
.sdiv::before,.sdiv::after{content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--border),transparent);}
.sdiv-txt{font-size:10px;color:var(--text3);letter-spacing:3px;white-space:nowrap;}

/* narration */
.narr{
  background:var(--bg4);border-left:3px solid var(--acc2);
  padding:14px 18px;margin:6px 0;font-size:15px;line-height:2;
  color:var(--text2);border-radius:0 5px 5px 0;
}

/* dialogue */
.dlg{margin:10px 0;}
.sp-label{font-size:10px;color:var(--text3);letter-spacing:2px;
  margin-bottom:5px;display:flex;align-items:center;gap:6px;}
.sp-label.R{justify-content:flex-end;}
.sp-dot{width:5px;height:5px;border-radius:50%;background:var(--acc);}
.brow{display:flex;align-items:flex-start;gap:9px;}
.brow.R{flex-direction:row-reverse;}
.ava{width:42px;height:42px;min-width:42px;border-radius:5px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:12px;font-weight:bold;border:1px solid var(--border2);}
.ava-n{font-size:8px;color:var(--text3);letter-spacing:0.5px;margin-top:1px;}
.bub{max-width:78%;padding:11px 15px;border-radius:7px;
  font-size:15px;line-height:1.9;position:relative;}
.bub.npc{background:var(--bg3);border:1px solid var(--border);}
.bub.npc::before{content:'';position:absolute;left:-7px;top:12px;
  border:7px solid transparent;border-right-color:var(--border);}
.bub.npc::after{content:'';position:absolute;left:-5px;top:13px;
  border:6px solid transparent;border-right-color:var(--bg3);}
.bub.you{background:#2a1d0e;border:1px solid var(--acc);}
.bub.you::before{content:'';position:absolute;right:-7px;top:12px;
  border:7px solid transparent;border-left-color:var(--acc);}
.bub.you::after{content:'';position:absolute;right:-5px;top:13px;
  border:6px solid transparent;border-left-color:#2a1d0e;}

/* ══ CLICK TO CONTINUE ══ */
.ctc{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:22px;padding:12px;cursor:pointer;
  color:var(--text3);font-size:12px;letter-spacing:2px;
  animation:ctcPulse 1.5s ease-in-out infinite;
  border-top:1px solid var(--border);
  user-select:none;
}
.ctc::after{content:'▼';font-size:10px;}
@keyframes ctcPulse{0%,100%{opacity:.5}50%{opacity:1}}

/* ══ WORD HIGHLIGHT ══ */
.w{color:var(--acc3);border-bottom:1px dashed var(--acc);
  cursor:pointer;font-weight:bold;transition:all .15s;}
.w:hover{color:#fff;text-shadow:0 0 8px var(--acc);}
.wn{font-size:11px;color:var(--text3);font-weight:normal;margin-left:1px;}

/* ══ CHOICES ══ */
.choices{margin-top:20px;}
.choice-prompt{font-size:12px;color:var(--acc);letter-spacing:2px;
  padding:9px 14px;background:var(--bg3);border-left:3px solid var(--acc);margin-bottom:10px;}
.choice-list{display:flex;flex-direction:column;gap:7px;}
.cbtn{
  display:flex;align-items:flex-start;gap:10px;
  background:var(--bg2);border:1px solid var(--border);
  padding:12px 16px;cursor:pointer;text-align:left;
  color:var(--text);font-size:14px;line-height:1.8;
  font-family:inherit;transition:all .2s;border-radius:4px;
}
.cbtn:hover{background:var(--bg3);border-color:var(--acc);color:var(--acc3);}
.ckey{min-width:24px;height:24px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:3px;display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--acc);margin-top:2px;flex-shrink:0;}

/* ══ STAT POPUP (橙光风格) ══ */
#stat-popup{
  position:fixed;inset:0;z-index:5000;
  background:rgba(0,0,0,.8);
  display:none;align-items:center;justify-content:center;
  flex-direction:column;
}
#stat-popup.show{display:flex;}
.sp-box{
  background:var(--bg2);border:1px solid var(--acc);border-radius:10px;
  padding:32px 40px;text-align:center;max-width:400px;width:90%;
}
.sp-chapter{font-size:11px;color:var(--text3);letter-spacing:3px;margin-bottom:16px;}
.sp-title{font-size:22px;color:var(--acc3);letter-spacing:4px;margin-bottom:6px;}
.sp-subtitle{font-size:12px;color:var(--text2);margin-bottom:28px;}
.sp-stats{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
.sp-stat-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:var(--bg3);border-radius:6px;border:1px solid var(--border);
}
.sp-stat-left{display:flex;align-items:center;gap:8px;}
.sp-stat-icon{font-size:16px;}
.sp-stat-name{font-size:13px;color:var(--text2);}
.sp-stat-delta{
  font-size:15px;font-weight:bold;
  display:flex;align-items:center;gap:4px;
}
.sp-stat-delta.up{color:#5cb85c;animation:deltaUp .5s ease;}
.sp-stat-delta.dn{color:#d9534f;animation:deltaUp .5s ease;}
.sp-stat-delta.neu{color:var(--text3);}
@keyframes deltaUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.sp-rank{
  font-size:13px;color:var(--text2);padding:10px 16px;
  background:var(--bg3);border-radius:6px;border:1px solid var(--border);
  margin-bottom:20px;line-height:1.7;
}
.sp-rank strong{color:var(--acc3);}
.sp-next{
  padding:11px 40px;background:var(--acc);color:#000;border:none;
  cursor:pointer;font-size:14px;letter-spacing:4px;font-family:inherit;
}

/* ══ DEATH SCREEN ══ */
#death-screen{
  position:fixed;inset:0;z-index:6000;
  background:rgba(90,0,0,.93);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:30px;
}
#death-screen.show{display:flex;}
.dc{font-size:7rem;color:#500;line-height:1;animation:dpulse 2s ease infinite;}
@keyframes dpulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
.dt{font-size:1.8rem;color:var(--acc2);margin:10px 0 6px;letter-spacing:4px;}
.dr{font-size:13px;color:var(--text2);max-width:440px;line-height:1.8;margin:0 auto 16px;}
.dw{background:rgba(0,0,0,.4);border:1px solid var(--border);
  padding:10px 18px;margin:0 auto 24px;max-width:380px;
  font-size:12px;color:var(--acc3);line-height:1.7;}
.rbtn{padding:11px 36px;background:var(--acc2);color:#fff;border:none;
  cursor:pointer;font-size:14px;letter-spacing:3px;font-family:inherit;}

/* ══ VOCAB DRAWER ══ */
#vd-overlay{
  position:fixed;inset:0;z-index:7000;
  background:rgba(0,0,0,.72);
  display:none;align-items:flex-end;justify-content:center;
}
#vd-overlay.open{display:flex;}
.vd{width:100%;max-width:660px;background:var(--bg2);
  border-top:2px solid var(--acc);border-radius:14px 14px 0 0;
  max-height:78vh;overflow-y:auto;
  animation:vdUp .3s cubic-bezier(.22,1,.36,1);}
@keyframes vdUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.vd-handle{width:36px;height:3px;background:var(--border2);border-radius:2px;margin:10px auto 0;}
.vd-head{padding:14px 20px 12px;border-bottom:1px solid var(--border);}
.vd-en{font-size:1.8rem;color:var(--acc3);font-family:Georgia,serif;letter-spacing:1px;}
.vd-phon{font-size:12px;color:var(--text3);margin:2px 0 3px;font-family:sans-serif;}
.vd-pos{font-size:13px;color:var(--text2);}
.vd-x{float:right;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;}
.vd-x:hover{color:var(--acc);}
.vd-tabs{display:flex;background:#0d0b09;border-bottom:1px solid var(--border);}
.vtab{flex:1;padding:9px 4px;background:none;border:none;
  border-bottom:2px solid transparent;color:var(--text3);
  font-size:12px;cursor:pointer;font-family:inherit;transition:all .18s;}
.vtab.on{color:var(--acc);border-bottom-color:var(--acc);}
.vpanel{display:none;padding:16px 20px 24px;}
.vpanel.on{display:block;}
.rc{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:12px 14px;margin-bottom:10px;}
.rt{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:4px;font-family:sans-serif;}
.rw{font-size:1.1rem;color:var(--acc3);font-family:Georgia,serif;margin-bottom:3px;}
.rm{font-size:12px;color:var(--text2);line-height:1.5;}
.rf{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;}
.rp{background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  padding:2px 9px;font-size:10px;color:var(--text2);font-family:sans-serif;}
.mb{border-left:3px solid var(--acc);padding:9px 12px;background:rgba(212,168,48,.05);
  margin-top:10px;border-radius:0 5px 5px 0;}
.mbl{font-size:9px;letter-spacing:2px;color:var(--acc);margin-bottom:3px;font-family:sans-serif;}
.mbt{font-size:12px;color:var(--text2);line-height:1.6;}
.pi{padding:9px 0;border-bottom:1px solid var(--bg3);}
.pi:last-child{border-bottom:none;}
.pe{font-size:14px;color:var(--acc3);font-family:sans-serif;margin-bottom:2px;}
.pz{font-size:11px;color:var(--text3);margin-bottom:4px;}
.px{font-size:12px;color:var(--text3);font-style:italic;font-family:sans-serif;line-height:1.5;}
.ei{background:var(--bg3);border-left:3px solid var(--acc2);
  border-radius:0 5px 5px 0;padding:11px 13px;margin-bottom:9px;}
.et{font-size:13px;color:var(--text);line-height:1.9;}
.en2{font-size:10px;color:var(--text3);margin-top:3px;font-family:sans-serif;}
.vd-foot{padding:9px 20px 14px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:9px;}
.vdf-l{font-size:10px;color:var(--text3);}
.vdf-b{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.vdf-f{height:100%;background:var(--acc);border-radius:2px;transition:width .5s;}
.vdf-n{font-size:10px;color:var(--acc);}

@media(max-width:480px){
  .g-title{font-size:1.8rem;letter-spacing:6px;}
  .bub{max-width:90%;}
  .sp-box{padding:24px 20px;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="tb-left">
    <div>
      <div class="tb-title">凤鸣深宫</div>
      <div class="tb-chap" id="tb-chap">序章</div>
    </div>
    <button class="nav-btn" id="btn-ch1" onclick="navChapter(1)">一</button>
    <button class="nav-btn" id="btn-ch2" onclick="navChapter(2)">二</button>
    <button class="nav-btn" onclick="showChapSel()">章节</button>
  </div>
  <div class="tb-right">
    <div class="vocab-pill">词汇 <span id="wc">0</span>/90</div>
  </div>
  <div id="prog"></div>
</div>

<!-- STAT BAR -->
<div id="statbar">
  <div class="stat-item">
    <span class="stat-icon">🧠</span>
    <span class="stat-name">心机</span>
    <span class="stat-val" id="s-scheming" style="color:#c8a870">0</span>
    <div class="stat-bar-wrap"><div class="stat-bar-fill" id="b-scheming" style="background:#c8a870;width:0%"></div></div>
  </div>
  <div class="stat-item">
    <span class="stat-icon">💡</span>
    <span class="stat-name">智慧</span>
    <span class="stat-val" id="s-wisdom" style="color:#70b8f0">0</span>
    <div class="stat-bar-wrap"><div class="stat-bar-fill" id="b-wisdom" style="background:#70b8f0;width:0%"></div></div>
  </div>
  <div class="stat-item">
    <span class="stat-icon">💃</span>
    <span class="stat-name">才艺</span>
    <span class="stat-val" id="s-talent" style="color:#f090b0">0</span>
    <div class="stat-bar-wrap"><div class="stat-bar-fill" id="b-talent" style="background:#f090b0;width:0%"></div></div>
  </div>
  <div class="stat-item">
    <span class="stat-icon">💖</span>
    <span class="stat-name">圣宠</span>
    <span class="stat-val" id="s-favor" style="color:#f0a050">0</span>
    <div class="stat-bar-wrap"><div class="stat-bar-fill" id="b-favor" style="background:#f0a050;width:0%"></div></div>
  </div>
  <div class="stat-item">
    <span class="stat-icon">🛡</span>
    <span class="stat-name">势力</span>
    <span class="stat-val" id="s-power" style="color:#90d090">0</span>
    <div class="stat-bar-wrap"><div class="stat-bar-fill" id="b-power" style="background:#90d090;width:0%"></div></div>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- GATE -->
  <div class="screen active" id="gate-screen">
    <div class="gate-wrap" id="gate-wrap">
      <div class="gate-half L"><div class="gate-pat"></div><div class="gate-ring"></div></div>
      <div class="gate-half R"><div class="gate-pat"></div><div class="gate-ring"></div></div>
      <div class="gate-overlay">
        <div class="gate-center">
          <div class="g-series">凤 鸣 深 宫</div>
          <div class="g-chapnum">CHAPTER · SELECT</div>
          <div class="g-title">宫 闱 权 谋</div>
          <div class="g-sub">— 沉浸式宫斗词汇游戏 —</div>
          <button class="enter-btn" onclick="showChapSel()">推 门 入 宫</button>
        </div>
      </div>
    </div>
  </div>

  <!-- CHAPTER SELECT -->
  <div class="screen" id="chapsel-screen">
    <div class="chapsel-title">章节选择</div>
    <div class="chapsel-sub">· CHAPTER SELECT ·</div>
    <div class="chap-cards">
      <div class="chap-card" onclick="startChapter(1)">
        <div class="cc-num">一</div>
        <div class="cc-info">
          <div class="cc-name">惊鸿初见</div>

// ════════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════════
const STATS = {scheming:0,wisdom:0,talent:0,favor:0,power:0};
const STAT_MAX = 40;
let seenWords = new Set();
let unlockedChapters = new Set([1]);
let currentChapter = 0;
let pageQueue = [];    // array of page render functions
let pageIndex = 0;
let stateStack = [];
let correctCount = 0;
let totalWords = Object.keys(WDB).length;

// ════════════════════════════════════════════
//  WORD helper
// ════════════════════════════════════════════
function w(key, display) {
  const v = WDB[key];
  if (!v) return `<span style="color:var(--acc3)">${display}</span>`;
  seenWords.add(key);
  updateWordCount();
  const note = v.pos.split('；')[0].replace(/^(adj\.|adv\.|v\.|n\.|conj\.)\s*/,'').slice(0,6);
  return `<span class="w" onclick="openVD('${key}')">${display}<span class="wn">（${note}）</span></span>`;
}

function updateWordCount() {
  const n = seenWords.size;
  document.getElementById('wc').textContent = n;
  document.getElementById('prog').style.width = (n/totalWords*100)+'%';
}

// ════════════════════════════════════════════
//  STAT SYSTEM
// ════════════════════════════════════════════
function changeStat(key, delta) {
  STATS[key] = Math.max(0, Math.min(STAT_MAX, (STATS[key]||0) + delta));
  const el = document.getElementById('s-'+key);
  const bar = document.getElementById('b-'+key);
  if (el) el.textContent = STATS[key];
  if (bar) bar.style.width = (STATS[key]/STAT_MAX*100)+'%';
}

// ════════════════════════════════════════════
//  SCREEN NAV
// ════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showChapSel() {
  // animate gate if needed
  const gw = document.getElementById('gate-wrap');
  if (gw) {
    gw.classList.add('gate-open');
    setTimeout(()=>showScreen('chapsel-screen'), 600);
  } else {
    showScreen('chapsel-screen');
  }
}

function navChapter(n) {
  if (!unlockedChapters.has(n)) return;
  startChapter(n);
}

// ════════════════════════════════════════════
//  PAGE ENGINE
// ════════════════════════════════════════════
function startChapter(n) {
  currentChapter = n;
  pageQueue = [];
  pageIndex = 0;
  stateStack = [];
  correctCount = 0;

  document.getElementById('tb-chap').textContent =
    n===1 ? '第一章 · 惊鸿初见' : '第二章 · 暗流涌动';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb = document.getElementById('btn-ch'+n);
  if(nb) nb.classList.add('active');

  showScreen('story-screen');

  if (n===1) buildChapter1();
  else buildChapter2();

  renderPage(0);
}

// Build a page: each page is {nodes: [...], onContinue: fn|null}
// nodes are HTML strings or special objects
function buildPage(nodes, prompt, choices) {
  // prompt/choices: optional choice block at end
  return {nodes, prompt, choices};
}

function renderPage(idx) {
  pageIndex = idx;
  const pw = document.getElementById('page-wrap');
  pw.innerHTML = '';

  const page = pageQueue[idx];
  if (!page) return;

  // page counter
  const pc = document.createElement('div');
  pc.className = 'page-counter';
  pc.textContent = `第 ${idx+1} 页 / 共 ${pageQueue.length} 页`;
  pw.appendChild(pc);

  // render nodes one by one with typewriter / click advance
  renderNodes(pw, page, 0);
}

function renderNodes(pw, page, ni) {
  if (ni >= page.nodes.length) {
    // all nodes shown — show choices or continue btn
    if (page.choices) {
      showChoicesOnPage(pw, page);
    } else if (pageIndex < pageQueue.length - 1) {
      addCTC(pw, ()=>renderPage(pageIndex+1));
    }
    return;
  }
  const node = page.nodes[ni];
  const el = createNodeEl(node);
  pw.appendChild(el);
  el.style.opacity = '0';
  el.style.transform = 'translateY(8px)';
  el.style.transition = 'opacity .4s, transform .4s';
  requestAnimationFrame(()=>{
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
  });
  pw.scrollTop = pw.scrollHeight;

  // If text content, do typewriter then add CTC for next node
  if (node.type === 'narr' || node.type === 'dlg' || node.type === 'div') {
    addCTC(pw, ()=>{
      // remove ctc
      const ctc = pw.querySelector('.ctc');
      if(ctc) ctc.remove();
      renderNodes(pw, page, ni+1);
    });
  } else {
    renderNodes(pw, page, ni+1);
  }
}

function createNodeEl(node) {
  const d = document.createElement('div');
  if (node.type === 'narr') {
    d.className = 'narr';
    d.innerHTML = node.html;
  } else if (node.type === 'dlg') {
    d.className = 'dlg';
    const isRight = node.side === 'right';
    d.innerHTML = `
      <div class="sp-label ${isRight?'R':''}">
        <div class="sp-dot"></div>
        <span>${node.who} · ${node.role}</span>
      </div>
      <div class="brow ${isRight?'R':''}">
        <div class="ava" style="background:${node.color};border-color:${node.color}44">
          ${node.who[0]}<div class="ava-n">${node.who.slice(1,3)||''}</div>
        </div>
        <div class="bub ${isRight?'you':'npc'}">${node.html}</div>
      </div>`;
  } else if (node.type === 'div') {
    d.className = 'sdiv';
    d.innerHTML = `<span class="sdiv-txt">${node.text}</span>`;
  }
  return d;
}

function addCTC(pw, cb) {
  const ctc = document.createElement('div');
  ctc.className = 'ctc';
  ctc.textContent = '点击继续';
  ctc.onclick = cb;
  pw.appendChild(ctc);
  pw.scrollTop = pw.scrollHeight;
}

function showChoicesOnPage(pw, page) {
  // save state
  const snap = {
    pageIdx: pageIndex,
    pageQueue: JSON.stringify(pageQueue.map(p=>({nodes:p.nodes,prompt:p.prompt,choices:p.choices}))),
    innerHtml: pw.innerHTML
  };

  const area = document.createElement('div');
  area.className = 'choices';
  const ks = ['A','B','C'];
  area.innerHTML = `<div class="choice-prompt">◆ ${page.prompt}</div>
    <div class="choice-list">${page.choices.map((c,i)=>
      `<button class="cbtn" data-i="${i}">
        <div class="ckey">${ks[i]}</div>
        <div>${c.label}</div>
      </button>`).join('')}
    </div>`;
  pw.appendChild(area);
  pw.scrollTop = pw.scrollHeight;

  area.querySelectorAll('.cbtn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      stateStack.push(snap);
      const i = parseInt(btn.dataset.i);
      area.remove();
      page.choices[i].action();
    });
  });
}

function die(reason, hint) {
  document.getElementById('dr').innerHTML = reason;
  document.getElementById('dw').innerHTML = hint||'';
  const ds = document.getElementById('death-screen');
  ds.classList.add('show');
}

function revive() {
  document.getElementById('death-screen').classList.remove('show');
  const last = stateStack.pop();
  if (!last) return;
  // restore page
  pageIndex = last.pageIdx;
  const pw = document.getElementById('page-wrap');
  pw.innerHTML = last.innerHtml;
  // re-attach choice handler
  showChoicesOnPage(pw, pageQueue[pageIndex]);
}

function showStatPopup(chapTitle, chapSub, deltas, rankText, onNext) {
  document.getElementById('sp-title').textContent = chapTitle;
  document.getElementById('sp-sub').textContent = chapSub;
  document.getElementById('sp-ch').textContent = currentChapter===1?'第一章完结':'第二章完结';

  const ICONS = {scheming:'🧠',wisdom:'💡',talent:'💃',favor:'💖',power:'🛡'};
  const NAMES = {scheming:'心机',wisdom:'智慧',talent:'才艺',favor:'圣宠',power:'势力'};
  let html = '';
  for (const [k,d] of Object.entries(deltas)) {
    if (!d) continue;
    const cls = d>0?'up':'dn';
    const sign = d>0?'+':'';
    html += `<div class="sp-stat-row">
      <div class="sp-stat-left">
        <span class="sp-stat-icon">${ICONS[k]}</span>
        <span class="sp-stat-name">${NAMES[k]}</span>
      </div>
      <div class="sp-stat-delta ${cls}">${sign}${d}</div>
    </div>`;
  }
  // animate each delta one by one
  const statsEl = document.getElementById('sp-stats');
  statsEl.innerHTML = html;
  document.getElementById('sp-rank').innerHTML = rankText;

  // apply actual stat changes
  for (const [k,d] of Object.entries(deltas)) changeStat(k,d);

  const popup = document.getElementById('stat-popup');
  popup.classList.add('show');

  // animate rows
  const rows = statsEl.querySelectorAll('.sp-stat-row');
  rows.forEach((r,i)=>{
    r.style.opacity='0';r.style.transform='translateY(10px)';
    setTimeout(()=>{r.style.transition='opacity .4s, transform .4s';r.style.opacity='1';r.style.transform='translateY(0)';}, i*180+300);
  });

  document.getElementById('sp-next-btn').onclick = ()=>{
    popup.classList.remove('show');
    onNext();
  };
}

function advancePage(extraNodes) {
  // Insert a new page after current with extra nodes, then continue
  const nextIdx = pageIndex + 1;
  const insertPage = buildPage(extraNodes, null, null);
  pageQueue.splice(nextIdx, 0, insertPage);
  renderPage(nextIdx);
}

function endChapter1() {
  // Show ending narration then stat popup
  const pw = document.getElementById('page-wrap');
  const end = document.createElement('div');
  end.className = 'narr';
  end.innerHTML = `
    <div style="font-size:13px;color:var(--acc);margin-bottom:10px;letter-spacing:2px;">✦ 第一章结局</div>
    次日，一道旨意颁下：华妃罚俸半年，绿萝逐出宫廷，苏婉 ${w('promote','promote')} 为婕妤，赐蕊香阁正殿居住。<br><br>
    你 ${w('realise','realise')} 了一件事：宫中的 ${w('struggle','struggle')} 从未停止，但只要你保有 ${w('spirit','spirit')}、${w('strength','strength')}，并懂得 ${w('manage','manage')} 每一个机会，你就永远有翻身的可能。<br><br>
    <span style="color:var(--acc3)">这才是第一章，而你……才刚刚开始。</span>`;
  pw.appendChild(end);
  pw.scrollTop = pw.scrollHeight;

  const rank = correctCount>=7?'凤凰涅槃·上上签':correctCount>=5?'浴火重生·中上签':'险象环生·中签';

  setTimeout(()=>{
    unlockedChapters.add(2);
    document.getElementById('ch2-card').classList.remove('locked');
    document.getElementById('ch2-badge').className = 'cc-badge done';
    document.getElementById('ch2-badge').textContent = '已解锁';
    document.getElementById('ch1-badge').className = 'cc-badge done';
    document.getElementById('ch1-badge').textContent = '✓ 完结';

    showStatPopup(
      '惊鸿初见',
      '· 你已在宫中站稳了脚跟 ·',
      {scheming:3, wisdom:4, talent:-2, favor:3, power:2},
      `宫廷评价：<strong>${rank}</strong><br>本章习得词汇：<strong>${seenWords.size}</strong> 个<br>正确决策：<strong>${correctCount}</strong> / 8 回合`,
      ()=>startChapter(2)
    );
  }, 2000);
}

  '华妃要你当众作诗，且必须直接描写宫中秋景，你怎么做？',
  [
    {label:`A. 从容起身，以一首言辞婉转的诗作应对，${w('avoid','avoid')} 任何敏感词汇`,
     action:()=>{correctCount++;advancePage([
       D('苏婉（你）','你自己','#2a3a2a','right',
         `"秋风不识宫门高，吹散金菊入池梢。翠袖拢香无人问，却待月明独自摇。"`),
       N(`雅集中安静了片刻，随即有人轻轻鼓掌。诗中既有秋景，又有一丝淡淡的寂寥，令人回味——华妃本想 ${w('mislead','mislead')} 你犯错，却反而为你搭了一个展示 ${w('talent','talent')} 的台。`),
     ]);}},
    {label:`B. 以 ${w('directly','directly')} 犀利的诗句描写宫中的争斗与 ${w('struggle','struggle')}，显示自己的锋芒`,
     action:()=>die(
       `你的诗句锋芒毕露，隐含着对宫廷权谋的讽刺。华妃脸色一沉，全场噤若寒蝉。皇上得知后，只说了一句："文辞倒是不凡，只是……不懂分寸。"`,
       `💡 词汇：<strong>directly</strong>（直接地）——才华展示需要分寸感，锋芒毕露往往比锋芒内敛代价更大。`)},
    {label:`C. 称自己才学浅薄，${w('hesitate','hesitate')} 推辞，请华妃另请他人`,
     action:()=>die(
       `你的推辞让华妃嘴角浮起一丝冷笑："婕妤娘娘怎么如此 ${w('hesitate','hesitate')} 呢？连一首诗都不敢作，日后如何在宫中立足？"你坐实了"无才"的名声。`,
       `💡 词汇：<strong>hesitate</strong>（犹豫）——在展示的场合，犹豫不决比失败更致命。`)}
  ]));

  // PAGE 6 — 回合6
  pageQueue.push(buildPage([
    DIV('回合六 · 秘密同盟'),
    N(`雅集后，一个意想不到的人来到了蕊香阁——德妃。她是宫中一直保持中立的嫔妃，既不与华妃为伍，也不靠近皇后。她此次来，带来了一个令你震惊的 ${w('announce','announce')}。`),
    D('德妃','宫中中立势力','#3a4a5a','left',
      `苏婕妤，本宫直说吧。华妃 ${w('arrange','arrange')} 了一个局——她想在下个月的中秋宴上，让你在皇上面前出丑，彻底失去圣宠。本宫 ${w('warn','warn')} 你，是因为我们或许可以 ${w('support','support')||'互相支持'}。你愿意与本宫结盟吗？`),
  ],
  '德妃提出结盟，你是否接受？',
  [
    {label:`A. 表示感谢，但需要时间 ${w('consider','consider')}，约定三日后给予答复`,
     action:()=>{correctCount++;advancePage([
       D('苏婉（你）','你自己','#2a3a2a','right',
         `"德妃娘娘的好意，臣妾铭记于心。只是此事关系重大，臣妾 ${w('hesitate','hesitate')} 于仓促决定。可否给臣妾三日时间 ${w('consider','consider')}？"`),
       N(`德妃微微颔首："有头脑。"三日后，你经过仔细调查，确认德妃确无恶意，便以一种对双方都有利的方式达成了共识。你在宫中第一次有了真正意义上的 ${w('support','support')||'盟友'}。`),
     ]);}},
    {label:`B. 立刻欣然答应，表示 ${w('desire','desire')} 结盟，越快越好`,
     action:()=>die(
       `你太快答应了。德妃眼中闪过一丝轻蔑——一个如此轻易就能被 ${w('persuade','persuade')} 的人，在权谋中是最容易被利用的棋子。三日后，德妃的要求比你预期的多了许多。`,
       `💡 词汇：<strong>desire</strong>（渴望）——过于迫切的渴望暴露了弱点，在谈判中是致命的。`)},
    {label:`C. 断然 ${w('avoid','avoid')} ，表示不参与任何派系，保持中立`,
     action:()=>die(
       `你拒绝了德妃。三周后的中秋宴，你孤立无援，华妃的计划几乎完美地将你击垮，而你没有任何援手。纯粹的中立，在宫中等于孤立。`,
       `💡 词汇：<strong>avoid</strong>（回避）——在宫中，完全的中立往往意味着在关键时刻没有支援。`)}
  ]));

  // PAGE 7 — 回合7
  pageQueue.push(buildPage([
    DIV('回合七 · 中秋宴·暗箭'),
    N(`中秋宴夜。华灯璀璨，歌舞升平，然而你知道，危机正在 ${w('approach','approach')||'逼近'}。华妃的计划是：在宫中乐师演奏时，让人 ${w('announce','announce')} 你将独自演奏一曲，而事实上你根本没有准备。这是一个精心 ${w('arrange','arrange')} 的 ${w('trap','trap')||'陷阱'}。`),
    D('宫中司仪','（受人指使）','#2a2a2a','left',
      `皇上，婕妤苏氏自愿献艺，为皇上 ${w('produce','produce')} 一支独奏，以表 ${w('desire','desire')}……`),
    D('苏婉（你）','你自己','#2a3a2a','right',
      `（你猝不及防。所有人的目光都已转向了你。华妃正以一个得意的微笑注视着你，等待你出丑。）`),
  ],
  '你被突然推上表演，毫无准备，你如何应对？',
  [
    {label:`A. 镇定起身，${w('produce','produce')} 一首即兴的歌谣，将危机化为 ${w('talent','talent')} 展示`,
     action:()=>{correctCount++;advancePage([
       N(`你深吸一口气，缓缓站起，从容道："皇上，臣妾斗胆，以一首家乡的小调，为今夜助兴。"你的声音并不宏亮，但咬字清晰，韵律自然，有一种民间的清新之气。`),
       N(`皇上竟然微微前倾，认真地听完了。"不错，"他说，"倒是许久没听到这样的曲调了。"华妃的脸色在那一刻彻底沉了下来。`),
     ]);}},
    {label:`B. ${w('directly','directly')} 声明这是误会，当众揭穿这是有人故意 ${w('mislead','mislead')} 司仪`,
     action:()=>die(
       `你当众指控有人蓄意陷害，宴席气氛顿时剑拔弩张。皇上沉着脸："中秋佳节，何必如此 ${w('struggle','struggle')} 生事？"你虽揭穿了阴谋，却破坏了宴席的气氛，两败俱伤。`,
       `💡 词汇：<strong>directly</strong>（直接地）——当众揭穿阴谋，有时会让自己也陷入被动。`)},
    {label:`C. 称病晕倒，${w('avoid','avoid')} 上台，以 ${w('regret','regret')} 身体不适为由退场`,
     action:()=>die(
       `你装晕倒下，宴席被迫中断。皇上十分不悦："苏婕妤……体质如此孱弱，令人 ${w('concern','concern')} 。"华妃趁机向皇上进言，说你娇气难以侍奉。`,
       `💡 词汇：<strong>regret</strong>（遗憾）——逃避是一时的缓解，却留下了更大的把柄。`)}
  ]));

  // PAGE 8 — 回合8 终局
  pageQueue.push(buildPage([
    DIV('回合八 · 第二章终局'),
    N(`中秋宴后，皇上将你单独留下。他罕见地摒退了所有宫人，整个偏殿只有你们两人。你知道，接下来的话，将决定你在这深宫中的最终走向。`),
    D('皇上','天子','#1a1a4a','left',
      `苏婉，朕 ${w('wonder','wonder')} 一件事……你今夜所做的一切，是刻意 ${w('arrange','arrange')} 好的，还是当下 ${w('directly','directly')} 应变的？`),
  ],
  '皇上问你今夜的应对是刻意还是本能，你如何回答？',
  [
    {label:`A. 坦诚道：一半是 ${w('arrange','arrange')} 的准备，一半是 ${w('strength','strength')} 撑过来的`,
     action:()=>{correctCount++;endChapter2();}},
    {label:`B. 表示一切都是 ${w('directly','directly')} 的临场发挥，自己什么都没有 ${w('arrange','arrange')}`,
     action:()=>die(
       `皇上微微一笑，那笑里有一丝看穿一切的意味："朕不 ${w('believe','believe')||'相信'} 。"他离开了，留下你在偏殿，独自 ${w('regret','regret')} 这一刻的不诚实。`,
       `💡 词汇：<strong>directly</strong>（直接）——有时过于"直接"的否认，反而暴露了掩饰。`)},
    {label:`C. ${w('persuade','persuade')} 皇上：这一切都是为了皇上着想，臣妾愿意为皇上做任何事`,
     action:()=>die(
       `皇上沉默了，站起身道："朕要的不是随时准备'做任何事'的人。"过于刻意的顺从，让皇上感到了距离。`,
       `💡 词汇：<strong>persuade</strong>（说服）——说服皇上的最好方式，是真实，而非表忠心。`)}
  ]));
}

function endChapter2() {
  const pw = document.getElementById('page-wrap');
  const end = document.createElement('div');
  end.className = 'narr';
  end.innerHTML = `
    <div style="font-size:13px;color:var(--acc);margin-bottom:10px;letter-spacing:2px;">✦ 第二章结局</div>
    皇上沉默了很久，最终道："诚实，是朕最欣赏的品质。"<br><br>
    次日，一道旨意颁下：婕妤苏氏晋为 ${w('promote','promote')} 嫔位，赐"婉"字封号——婉嫔。华妃因中秋宴之事被彻查，罚俸一年，禁足三月。<br><br>
    你 ${w('realise','realise')} 了：在这深宫之中，${w('strength','strength')} 不只是力量，更是在 ${w('struggle','struggle')} 中依然保有真实自我的勇气。<br><br>
    <span style="color:var(--acc3)">第二章完结。第三章，将是更深的漩涡……</span>`;
  pw.appendChild(end);
  pw.scrollTop = pw.scrollHeight;

  const rank2 = correctCount>=7?'步步为营·凤仪渐显':correctCount>=5?'稳中求胜·初露锋芒':'如履薄冰·仍需磨砺';

  setTimeout(()=>{
    document.getElementById('ch2-badge').className = 'cc-badge done';
    document.getElementById('ch2-badge').textContent = '✓ 完结';
    showStatPopup(
      '暗流涌动',
      '· 你在宫中的根基，正一点点稳固 ·',
      {scheming:4, wisdom:3, talent:3, favor:5, power:3},
      `宫廷评价：<strong>${rank2}</strong><br>本章习得词汇：<strong>${seenWords.size}</strong> 个<br>正确决策：<strong>${correctCount}</strong> / 8 回合`,
      ()=>{
        showChapSel();
      }
    );
  }, 2000);
}
</script>
</body>
