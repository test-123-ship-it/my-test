<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>内在小孩创伤类型测试 · 疗愈你的童年印记</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- html2canvas 截图库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #2c1e2f 0%, #1a142f 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            color: #faf3e5;
            min-height: 100vh;
            position: relative;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 1.5rem 1rem 2.5rem;
        }

        /* 封面页样式 */
        .cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2a1e3a, #0e0a1f);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
            transition: opacity 0.5s ease;
            overflow-y: auto;
        }
        .cover-card {
            background: rgba(30, 22, 48, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 3rem;
            padding: 2rem 1.5rem;
            text-align: center;
            max-width: 90%;
            width: 500px;
            border: 1px solid rgba(255, 215, 180, 0.4);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .cover-icon {
            font-size: 4rem;
            background: linear-gradient(135deg, #FFB7B2, #D4A5FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .cover h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #FFD6A5, #FFB7B2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .cover p {
            font-size: 1rem;
            opacity: 0.85;
            margin: 1rem 0;
            line-height: 1.5;
        }
        .cover-deco {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        .cover-deco i {
            font-size: 2rem;
            color: #FFB7B2;
            opacity: 0.7;
        }
        .start-btn {
            background: linear-gradient(95deg, #FFB7B2, #D4A5FF);
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            color: #1f1a2a;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
        }
        .start-btn:active { transform: scale(0.97); }
        .start-btn i { font-size: 1.2rem; }

        /* 原有卡片样式调整 */
        .card {
            background: rgba(30, 22, 48, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 215, 180, 0.3);
            padding: 1.5rem 1.2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
        }

        .section-title {
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-left: 4px solid #FFB7B2;
            padding-left: 0.8rem;
        }

        /* 分步答题样式 (与之前一致) */
        .step-container {
            min-height: 420px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .progress-bar {
            background: #3a2a4a;
            border-radius: 20px;
            height: 6px;
            margin-bottom: 1.8rem;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #FFB7B2, #D4A5FF);
            border-radius: 20px;
            transition: width 0.3s ease;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #FFD6A5;
        }
        .question-text {
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }
        .options-step {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }
        .option-step {
            background: rgba(255,240,210,0.08);
            border-radius: 60px;
            padding: 0.9rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .option-step.selected {
            background: #7f6b9e;
            border-color: #FFB7B2;
            box-shadow: 0 0 10px #d4a5ff;
        }
        .option-step .opt-icon {
            font-size: 1.2rem;
            width: 28px;
        }
        .option-step .opt-text {
            font-size: 0.95rem;
            font-weight: 500;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        .nav-btn {
            background: rgba(50, 40, 70, 0.8);
            border: 1px solid #FFB7B2;
            padding: 0.7rem 1.2rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: #FFE6D5;
            flex: 1;
            text-align: center;
        }
        .nav-btn.primary {
            background: linear-gradient(95deg, #FFB7B2, #D4A5FF);
            color: #1f1a2a;
            border: none;
        }
        .nav-btn:active { transform: scale(0.97); }
        .nav-btn.disabled { opacity: 0.4; pointer-events: none; }

        /* 结果区域 */
        .result-type {
            text-align: center;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .type-pattern {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            background: rgba(255,215,180,0.2);
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 100px;
        }
        .result-type h2 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #FFD6A5, #FFB7B2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .type-badge {
            background: #ffb7b230;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }
        .result-block {
            background: rgba(0,0,0,0.35);
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .result-block-title {
            font-weight: bold;
            margin-bottom: 0.5rem;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-left: 3px solid #FFB7B2;
            padding-left: 0.7rem;
        }
        .result-text {
            font-size: 0.9rem;
            line-height: 1.5;
            opacity: 0.92;
        }
        .share-tips {
            background: #2f2348;
            border-radius: 1.2rem;
            padding: 0.8rem;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 1rem;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #FFB7B2;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            color: #FFE6D5;
        }
        .footer-sell {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 2rem;
            opacity: 0.7;
            border-top: 1px dashed rgba(255,215,180,0.3);
            padding-top: 1.2rem;
        }
        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2f2348;
            backdrop-filter: blur(12px);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 999;
            color: #FFE6D5;
            box-shadow: 0 4px 12px black;
            pointer-events: none;
        }
        @media (max-width: 550px) {
            .question-text { font-size: 1.1rem; }
            .option-step { padding: 0.6rem 1rem; }
            .result-type h2 { font-size: 1.5rem; }
            .type-pattern { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
<!-- 封面页 -->
<div class="cover" id="coverPage">
    <div class="cover-card">
        <div class="cover-icon">
            <i class="fas fa-child"></i> <i class="fas fa-heart-broken"></i>
        </div>
        <h1>内在小孩·创伤类型</h1>
        <p>30道灵魂之问 · 看见你内心那个曾经受伤的小孩</p>
        <div class="cover-deco">
            <i class="fas fa-feather-alt"></i>
            <i class="fas fa-dove"></i>
            <i class="fas fa-hand-holding-heart"></i>
            <i class="fas fa-tree"></i>
            <i class="fas fa-star-of-life"></i>
        </div>
        <p style="font-size: 0.85rem;">每个人心中都住着一个内在小孩<br>他/她记录着童年的欢笑与伤痕</p>
        <button class="start-btn" id="startBtn"><i class="fas fa-play"></i> 开始探索我的内在小孩</button>
        <div style="margin-top: 1rem; font-size: 0.7rem; opacity: 0.6;">✨ 全程匿名 · 疗愈觉察 ✨</div>
    </div>
</div>

<div class="container" id="mainContent" style="display: none;">
    <!-- 分步答题卡片 -->
    <div class="card" id="stepCard">
        <div class="section-title"><i class="fas fa-seedling"></i> 探索你的内在小孩 · 30道深度自测</div>
        <div id="stepContainer" class="step-container"></div>
    </div>

    <!-- 结果展示区 -->
    <div class="card" id="resultCard" style="display: none;">
        <div class="section-title"><i class="fas fa-dove"></i> 你的内在小孩疗愈报告</div>
        <div id="resultContent">
            <div id="resultTypeArea"></div>
            <div id="resultDetailArea"></div>
            <div id="resultHealingArea"></div>
            <div id="resultPracticeArea"></div>
            <div class="share-tips">
                <span><i class="fas fa-hand-holding-heart"></i> 看见即是疗愈 · 分享给同样需要拥抱内在小孩的朋友</span>
                <button id="saveImgBtn" class="btn-outline"><i class="fas fa-camera"></i> 保存报告图片</button>
            </div>
        </div>
        <div style="margin-top: 10px; font-size: 0.7rem; text-align: center; opacity:0.6">🌟 本测试基于内在小孩疗愈理论，仅作自我觉察参考</div>
    </div>
    <div class="footer-sell">
        <i class="fas fa-leaf"></i> 深度疗愈课程 | 内在小孩冥想 | 1v1心理陪伴 可私信咨询<br>
        ✨ 关注 @内在星球疗愈所 获取更多心灵成长内容 ✨
    </div>
</div>

<script>
    // ---------- 30道内在小孩创伤维度测试题 ----------
    const QUESTIONS = [
        { text: "① 小时候，父母是否经常因为忙碌而忽略你的情感需求？", options: ["总是忽略", "经常忽略", "偶尔忽略", "很少忽略"] },
        { text: "② 当你想表达自己的感受时，家人通常的反应是？", options: ["不耐烦或打断", "敷衍回应", "耐心听完但无反馈", "认真倾听并共情"] },
        { text: "③ 你是否记得自己曾因为“不够好”而被严厉批评？", options: ["经常发生", "偶尔发生", "很少发生", "几乎没有"] },
        { text: "④ 家庭中是否有人情绪很不稳定，让你感到害怕？", options: ["经常有", "有时有", "很少", "从来没有"] },
        { text: "⑤ 你小时候是否觉得自己必须“听话”才能获得爱？", options: ["完全是这样", "大部分情况", "有时这样", "从不这样"] },
        { text: "⑥ 当你想尝试新事物时，家人常说的话是？", options: ["你不行/别冒险", "先问问我们", "小心一点就好", "支持你去试试"] },
        { text: "⑦ 你是否曾被家人当众嘲笑或贬低？", options: ["多次发生", "偶尔发生", "很少", "从未"] },
        { text: "⑧ 童年时期，你是否经历过与重要亲人的分离（如父母离异、寄养等）？", options: ["深刻创伤性分离", "有分离但仍有联系", "短暂分离", "没有分离"] },
        { text: "⑨ 当你犯错时，家里通常的氛围是？", options: ["严厉惩罚", "冷淡处理", "讲道理但要求完美", "包容并鼓励改正"] },
        { text: "⑩ 你是否觉得自己从小就要照顾家人的情绪？", options: ["完全是", "经常是", "偶尔是", "从来不是"] },
        { text: "⑪ 你小时候是否害怕表达不同意见？", options: ["非常害怕", "比较害怕", "有点顾虑", "敢于表达"] },
        { text: "⑫ 家人是否曾拿你和别人比较，让你觉得自己很差？", options: ["经常比较", "偶尔比较", "很少比较", "从不比较"] },
        { text: "⑬ 你是否目睹过家庭暴力或激烈争吵？", options: ["经常", "偶尔", "很少", "从未"] },
        { text: "⑭ 当你感到难过时，是否有人会安慰你？", options: ["从来没有人", "很少", "偶尔有人", "总是有人"] },
        { text: "⑮ 你小时候是否觉得自己不被任何人理解？", options: ["总是这样", "经常这样", "有时这样", "从不"] },
        { text: "⑯ 家人是否对你的生活有过多控制（如交友、穿着、选择）？", options: ["完全控制", "较多控制", "有时干涉", "尊重自主"] },
        { text: "⑰ 你是否因为害怕被抛弃而讨好别人？", options: ["总是", "经常", "有时", "从不"] },
        { text: "⑱ 你童年时的情绪是否经常被否定（如“不许哭”“这有什么好怕的”）？", options: ["经常被否定", "有时被否定", "很少", "从不"] },
        { text: "⑲ 你是否曾经觉得自己是家庭的“累赘”？", options: ["强烈感觉", "有时感觉", "偶尔闪过", "从未"] },
        { text: "⑳ 你是否记得有重要的人突然从你生活中消失？", options: ["有，创伤很深", "有，但影响不大", "没有突然消失", "完全稳定"] },
        { text: "㉑ 你小时候是否经常一个人待着，感到孤独？", options: ["经常孤独", "有时孤独", "很少", "从不"] },
        { text: "㉒ 当你取得成绩时，家人是否吝啬表扬？", options: ["从不表扬", "很少表扬", "偶尔表扬", "经常表扬"] },
        { text: "㉓ 家里是否有严格的规矩，违反就会受罚？", options: ["非常严苛", "比较严格", "一般", "宽松民主"] },
        { text: "㉔ 你是否曾在学校或家庭中遭受过羞辱性的惩罚？", options: ["多次经历", "一两次", "听说过但未经历", "从未"] },
        { text: "㉕ 你小时候是否害怕大声说话或发出声音？", options: ["非常害怕", "有点害怕", "不太怕", "完全不怕"] },
        { text: "㉖ 你是否觉得父母的爱是有条件的（必须表现好才被爱）？", options: ["完全有条件的爱", "大部分有", "偶尔感觉", "无条件的爱"] },
        { text: "㉗ 你童年时是否常被留下独自一人？", options: ["经常独自留守", "有时", "很少", "从不"] },
        { text: "㉘ 家人是否曾对你的外貌或能力进行贬低？", options: ["经常贬低", "偶尔", "很少", "从不"] },
        { text: "㉙ 你是否曾在争吵中被威胁“不要你了”？", options: ["多次被威胁", "一两次", "很少", "从未"] },
        { text: "㉚ 总体而言，你的童年安全感程度？", options: ["非常缺乏安全感", "不太安全", "基本安全", "非常安全"] }
    ];

    // 6种创伤类型定义（新增图案字段）
    const TRAUMA_TYPES = [
        {
            name: "被遗弃型内在小孩",
            shortDesc: "你内心深处总害怕被抛弃，容易在关系中过度依赖或讨好。",
            fullDesc: "这种创伤源于童年时重要抚养者的情感忽视、分离或威胁抛弃。你成年后常常担心别人会离开你，在亲密关系中容易患得患失，甚至不惜牺牲自我来换取安全感。你习惯性地将他人需求放在首位，却压抑自己的真实感受。",
            healingAdvice: "1. 练习“自我安抚”：当感到被抛弃的恐惧时，对自己说“现在的我是安全的，我可以陪伴自己”。\n2. 建立清晰的边界：学会在关系中表达自己的需求，允许别人有不同选择。\n3. 重新养育内在小孩：想象你拥抱那个害怕的小时候的自己，给他无条件的承诺。",
            practice: "【每日练习】写下三件“我今天为自己做的事”，无论多小。然后对镜子里的自己说：“我值得被爱，不因任何条件。”坚持21天。",
            pattern: "🌙🐾💔",   // 代表孤独与依恋
            icon: "fa-cloud-moon"
        },
        {
            name: "被否定型内在小孩",
            shortDesc: "你总是怀疑自己不够好，追求完美，害怕批评。",
            fullDesc: "童年时你经常被批评、被比较，或只有达到标准才能得到认可。长大后你内化了严厉的自我批判，总觉得“我不够好”，容易陷入完美主义，害怕失败，对他人的评价过度敏感。",
            healingAdvice: "1. 练习“自我肯定”：每天记录自己的三个优点或成就，无论大小。\n2. 允许自己犯错：把错误视为学习机会，而不是自我价值的否定。\n3. 区分“事实”与“评判”：当自我批评出现时，问自己“这是事实还是过去的回音？”",
            practice: "【自我肯定日记】每天睡前写下：“今天我做了……我对自己感到满意，因为……”。同时，对镜子说：“我本来的样子就足够好。”",
            pattern: "📝⚖️🌱",
            icon: "fa-file-alt"
        },
        {
            name: "被控制型内在小孩",
            shortDesc: "你害怕做决定，常感到窒息，难以活出真实的自己。",
            fullDesc: "童年时你的自主权被过度剥夺，家人替你做了太多选择。成年后你缺乏主见，容易被他人的意见左右，要么彻底顺从，要么在压抑后突然爆发反抗。你内心深处渴望自由，却又害怕承担责任。",
            healingAdvice: "1. 从小决定开始：每天为自己做一个小决定（吃什么、穿什么），强化自主感。\n2. 设立边界：对他人过度的干涉温和而坚定地说“不”。\n3. 探索真实兴趣：尝试那些你曾经想做但被禁止的事情，重新连接内在渴望。",
            practice: "【自主力练习】每周做一件“完全由自己决定”的事，并记录感受。例如：独自去一个地方、买一件自己喜欢但别人可能不认可的小物。",
            pattern: "🔗🕊️🌿",
            icon: "fa-handcuffs"
        },
        {
            name: "被羞辱型内在小孩",
            shortDesc: "你容易感到羞耻，不敢展现真实自我，害怕被嘲笑。",

            practice: "【拥抱羞耻练习】写下你曾感到羞耻的一件事，然后以成人的视角给当时的自己写一封信，表达理解和安慰。",
            pattern: "😔🌻✨",
            icon: "fa-face-frown"
        },
        {

            fullDesc: "童年经历过家庭暴力、激烈冲突或突发事件，让你长期处于恐惧中。成年后你的神经系统高度警觉，容易焦虑、失眠，对冲突和不确定性过度敏感，总在“备战”状态。",
            healingAdvice: "1. 学习身体安抚：深呼吸、轻拍胸口、拥抱自己，告诉身体“现在很安全”。\n2. 建立稳定节奏：规律作息、固定仪式（如泡茶、散步）能带来安全感。\n3. 减少刺激：避免过度摄入负面新闻，创造宁静的物理环境。",
            practice: "【安全锚点练习】每天花5分钟找一个让你感到安全的地方（或想象一个安全场景），深呼吸，对自己说：“此刻，我在这里，我是安全的。”",
            pattern: "⚡🌊🕯️",
            icon: "fa-bolt"
        },
        {
            name: "孤独型内在小孩",
            shortDesc: "你习惯独来独往，难以信任他人，渴望连接又害怕靠近。",
            fullDesc: "童年时情感被忽视，缺乏陪伴和情感回应。你学会了自己安慰自己，也形成了“只能靠自己”的信念。成年后你难以打开心扉，即使渴望亲密，也会下意识推开别人。",
            healingAdvice: "1. 逐步建立信任：从低风险的关系开始（如兴趣小组、支持性社群），慢慢练习分享。\n2. 与内在小孩对话：每天花时间陪伴自己，像对待朋友一样倾听内心的声音。\n3. 允许依赖：明白求助是健康的，尝试向可靠的人表达小需求。",
            practice: "【联结练习】每周主动联系一个人（朋友、家人），聊10分钟真心话。同时，写一封给“孤独的内在小孩”的信，承诺不再让他孤单。",
            pattern: "🌲🌌🔮",
            icon: "fa-tree"
        }
    ];

    // 评分函数（与原逻辑一致）
    function getScores(qIndex, optIdx) {
        const primaryMap = [
            0,0,1,4,2,2,3,0,1,2,  // 1-10
            2,1,4,0,5,2,0,3,0,0,  // 11-20
            5,1,2,3,4,1,0,1,0,5   // 21-30
        ];
        const primary = primaryMap[qIndex];
        let baseScore = 3 - optIdx;
        let scores = new Array(6).fill(0);
        scores[primary] = baseScore;
        if (primary === 0) { scores[5] += Math.floor(baseScore * 0.5); }
        if (primary === 1) { scores[3] += Math.floor(baseScore * 0.5); }
        if (primary === 2) { scores[0] += Math.floor(baseScore * 0.4); }
        if (primary === 3) { scores[1] += Math.floor(baseScore * 0.5); }
        if (primary === 4) { scores[5] += Math.floor(baseScore * 0.4); }
        if (primary === 5) { scores[0] += Math.floor(baseScore * 0.4); }
        return scores;
    }

    let answers = new Array(QUESTIONS.length).fill(null);
    let currentIndex = 0;
    let stepContainer = document.getElementById('stepContainer');
    let resultCard = document.getElementById('resultCard');
    let stepCard = document.getElementById('stepCard');
    let coverPage = document.getElementById('coverPage');
    let mainContent = document.getElementById('mainContent');

    // 开始按钮事件
    document.getElementById('startBtn').addEventListener('click', () => {
        coverPage.style.display = 'none';
        mainContent.style.display = 'block';
        renderStep();
    });

    function renderStep() {
        const q = QUESTIONS[currentIndex];
        const selectedVal = answers[currentIndex];
        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            const isSelected = (selectedVal === idx);
            optionsHtml += `<div class="option-step ${isSelected ? 'selected' : ''}" data-opt-index="${idx}"><div class="opt-icon"><i class="fas fa-angle-right"></i></div><div class="opt-text">${opt}</div></div>`;
        });
        const progressPercent = (currentIndex / QUESTIONS.length) * 100;
        const isLast = (currentIndex === QUESTIONS.length - 1);
        const nextBtnText = isLast ? '✨ 看见我的内在小孩 ✨' : '下一题 →';
        const showPrev = currentIndex > 0;
        stepContainer.innerHTML = `
            <div class="progress-bar"><div class="progress-fill" style="width: ${progressPercent}%;"></div></div>
            <div class="question-header"><span>第 ${currentIndex+1} / ${QUESTIONS.length} 题</span><span><i class="fas fa-star-of-life"></i> 倾听内在声音</span></div>
            <div class="question-text">${q.text}</div>
            <div class="options-step" id="stepOptions">${optionsHtml}</div>
            <div class="nav-buttons">${showPrev ? '<div class="nav-btn" id="prevBtn"><i class="fas fa-arrow-left"></i> 上一题</div>' : '<div class="nav-btn disabled">上一题</div>'}
            <div class="nav-btn primary" id="nextBtn">${nextBtnText} <i class="fas fa-arrow-right"></i></div></div>`;
        document.querySelectorAll('.option-step').forEach(optDiv => {
            optDiv.addEventListener('click', () => {
                const idx = parseInt(optDiv.dataset.optIndex, 10);
                answers[currentIndex] = idx;
                document.querySelectorAll('.option-step').forEach(el => el.classList.remove('selected'));
                optDiv.classList.add('selected');
            });
        });
        document.getElementById('prevBtn')?.addEventListener('click', () => { if(currentIndex>0){ currentIndex--; renderStep(); } });
        document.getElementById('nextBtn').addEventListener('click', () => {
            if(answers[currentIndex] === null){ showToast("请选择一个选项，继续探索你的内在小孩",1500); return; }
            if(currentIndex === QUESTIONS.length-1){
                if(!answers.every(a=>a!==null)){ showToast("还有未完成的题目，请返回检查",1800); return; }
                generateResult();
            } else { currentIndex++; renderStep(); }
        });
    }

    function generateResult() {
        let typeScores = new Array(6).fill(0);
        for (let i=0; i<answers.length; i++) {
            let inc = getScores(i, answers[i]);
            for (let t=0; t<6; t++) typeScores[t] += inc[t];
        }
        let maxScore = -1, maxType = 0;
        for (let i=0; i<6; i++) {
            if (typeScores[i] > maxScore) {
                maxScore = typeScores[i];
                maxType = i;
            }
        }
        const trauma = TRAUMA_TYPES[maxType];
        // 渲染结果（带图案）
        document.getElementById('resultTypeArea').innerHTML = `
            <div class="result-type">
                <div class="type-pattern"><i class="fas ${trauma.icon}"></i> ${trauma.pattern}</div>
                <h2>${trauma.name}</h2>
                <div class="type-badge"><i class="fas fa-hand-sparkles"></i> 你的内在小孩核心创伤类型</div>
                <div class="result-block" style="margin-top:0.8rem;"><div class="result-text">${trauma.shortDesc}</div></div>
            </div>
        `;
        document.getElementById('resultDetailArea').innerHTML = `
            <div class="result-block">
                <div class="result-block-title"><i class="fas fa-book-open"></i> 详细解读</div>
                <div class="result-text">${trauma.fullDesc}</div>
            </div>
        `;
        document.getElementById('resultHealingArea').innerHTML = `
            <div class="result-block">
                <div class="result-block-title"><i class="fas fa-seedling"></i> 疗愈建议</div>
                <div class="result-text" style="white-space: pre-line;">${trauma.healingAdvice}</div>
            </div>
        `;
        document.getElementById('resultPracticeArea').innerHTML = `
            <div class="result-block">
                <div class="result-block-title"><i class="fas fa-puzzle-piece"></i> 专属自我练习</div>
                <div class="result-text" style="white-space: pre-line;">${trauma.practice}</div>
            </div>
        `;
        stepCard.style.display = 'none';
        resultCard.style.display = 'block';
        resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
        showToast("报告已生成 · 看见即是疗愈的开始",2000);
    }

    function showToast(msg,dur){ let t=document.querySelector('.toast-msg'); if(t) t.remove(); let d=document.createElement('div'); d.className='toast-msg'; d.innerText=msg; document.body.appendChild(d); setTimeout(()=>d.remove(),dur); }

    async function captureResultCard(){
        if(resultCard.style.display==='none'){ showToast("请先完成测试并生成报告",1500); return; }
        const target=document.getElementById('resultContent');
        if(!target) return;
        try{
            const orig=document.body.style.overflow;
            document.body.style.overflow='hidden';
            const canvas=await html2canvas(target,{scale:2.5,backgroundColor:'#1a142f',logging:false});
            const link=document.createElement('a');
            link.download=`内在小孩疗愈报告.png`;
            link.href=canvas.toDataURL('image/png');
            link.click();
            document.body.style.overflow=orig;
            showToast("✅ 报告已保存，可以分享给需要的朋友",2500);
        } catch(e){ showToast("截图失败，请重试",1500); }
    }

    // 注意：页面初始封面显示，主内容隐藏，未开始时不渲染答题（避免空）
    document.getElementById('saveImgBtn')?.addEventListener('click',captureResultCard);
</script>
